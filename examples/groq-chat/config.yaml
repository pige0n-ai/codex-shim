# ── Groq Cloud Chat Completions ────────────────────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://api.groq.com/openai/v1"
  chat_path: "/chat/completions"
  api_key_env: "GROQ_API_KEY"
  max_retries: 2
  stream_max_retries: 2
  downstream_heartbeat_seconds: 30
provider:
  kind: groq-chat
  profile_config:
    profile: groq-chat
    capabilities:
      supports_parallel_tool_calls: false
models:
  default: "llama-3.3-70b-versatile"
  catalog:
    - slug: "llama-3.3-70b-versatile"
      context_window: 131072
      apply_patch_tool_type: freeform
state:
  backend: memory
  failed_debug_artifact_ttl_seconds: 0
logging:
  level: info
