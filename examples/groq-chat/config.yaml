# ── Groq Cloud Chat Completions ────────────────────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://api.groq.com/openai/v1"
  chat_path: "/chat/completions"
  api_key_env: "GROQ_API_KEY"
provider:
  kind: groq-chat
  profile_config:
    profile: groq-chat
    capabilities:
      supports_parallel_tool_calls: false
models:
  # Replace both fields with a model available on your Groq account.
  default: "your-groq-model"
  catalog:
    - slug: "your-groq-model"
      context_window: 131072
state:
  backend: memory
logging:
  level: info
