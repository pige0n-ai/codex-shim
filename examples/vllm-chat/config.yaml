# ── vLLM via Chat Completions (legacy mode) ────────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "http://127.0.0.1:8000/v1"
  chat_path: "/chat/completions"
  max_retries: 2
  stream_max_retries: 2
  downstream_heartbeat_seconds: 30
provider:
  kind: vllm-chat
  profile_config:
    profile: vllm-chat
reasoning:
  enabled: false
models:
  default: "your-vllm-model"
  catalog:
    - slug: "your-vllm-model"
      context_window: 131072
      apply_patch_tool_type: freeform
state:
  backend: memory
  failed_debug_artifact_ttl_seconds: 0
logging:
  level: info
