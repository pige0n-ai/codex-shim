# ── Together AI Chat Completions ───────────────────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://api.together.xyz/v1"
  chat_path: "/chat/completions"
  api_key_env: "TOGETHER_API_KEY"
provider:
  kind: together-chat
  profile_config:
    profile: together-chat
    capabilities:
      supports_parallel_tool_calls: true
models:
  # Replace both fields with a Together model slug available to your account.
  default: "your-together-model"
  catalog:
    - slug: "your-together-model"
      context_window: 131072
state:
  backend: memory
logging:
  level: info
