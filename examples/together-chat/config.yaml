# ── Together AI Chat Completions ───────────────────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://api.together.xyz/v1"
  chat_path: "/chat/completions"
  api_key_env: "TOGETHER_API_KEY"
  max_retries: 2
  stream_max_retries: 2
  downstream_heartbeat_seconds: 30
provider:
  kind: together-chat
  profile_config:
    profile: together-chat
    capabilities:
      supports_parallel_tool_calls: true
models:
  # Together recommends Llama 3.3 70B Turbo as a default starting point.
  default: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  catalog:
    - slug: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
      context_window: 131072
      apply_patch_tool_type: freeform
state:
  backend: memory
  failed_debug_artifact_ttl_seconds: 0
logging:
  level: info
