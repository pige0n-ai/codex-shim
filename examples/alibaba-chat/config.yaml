# ── Alibaba Cloud DashScope Chat Completions ───────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  chat_path: "/chat/completions"
  api_key_env: "DASHSCOPE_API_KEY"
  max_retries: 2
  stream_max_retries: 2
  downstream_heartbeat_seconds: 30
provider:
  kind: alibaba-chat
  profile_config:
    profile: alibaba-chat
    extra_body:
      enable_thinking: true
    capabilities:
      supports_vision_input: true
models:
  default: "qwen3.6-plus"
  catalog:
    - slug: "qwen3.6-plus"
      context_window: 131072
      apply_patch_tool_type: freeform
state:
  backend: memory
  failed_debug_artifact_ttl_seconds: 0
logging:
  level: info
