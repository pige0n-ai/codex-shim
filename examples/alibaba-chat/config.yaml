# ── Alibaba Cloud DashScope Chat Completions ───────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  chat_path: "/chat/completions"
  api_key_env: "DASHSCOPE_API_KEY"
provider:
  kind: alibaba-chat
  profile_config:
    profile: alibaba-chat
    extra_body:
      enable_thinking: true
    capabilities:
      supports_vision_input: true
state:
  backend: memory
