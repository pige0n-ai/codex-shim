# ── Fireworks AI Chat Completions ──────────────────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://api.fireworks.ai/inference/v1"
  chat_path: "/chat/completions"
  api_key_env: "FIREWORKS_API_KEY"
provider:
  kind: fireworks-chat
  profile_config:
    profile: fireworks-chat
models:
  # Fireworks' own Responses guide uses qwen3-235b-a22b in examples.
  default: "accounts/fireworks/models/qwen3-235b-a22b"
  catalog:
    - slug: "accounts/fireworks/models/qwen3-235b-a22b"
      context_window: 131072
state:
  backend: memory
logging:
  level: info
