# ── MiniMax OpenAI-Compatible Chat Completions ────────────────────
# Codex-facing: Responses  │  Upstream: Chat Completions (adapter-internal shim)
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://api.minimaxi.com/v1"
  api_key_env: "MINIMAX_API_KEY"
  max_retries: 2
  stream_max_retries: 2
  downstream_heartbeat_seconds: 30
provider:
  kind: minimax-chat
  profile_config:
    profile: minimax-chat
models:
  default: "MiniMax-M2.7"
  catalog:
    - slug: "MiniMax-M2.7"
      context_window: 204800
      apply_patch_tool_type: freeform
state:
  backend: memory
  failed_debug_artifact_ttl_seconds: 0
logging:
  level: info
