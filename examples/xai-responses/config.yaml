# ── xAI Responses API ─────────────────────────────────────────────
# Codex-facing: Responses  │  Upstream: Native Responses
server:
  listen: "127.0.0.1:8787"
upstream:
  base_url: "https://api.x.ai/v1"
  api_key_env: "XAI_API_KEY"
provider:
  kind: xai-responses
  profile_config:
    profile: xai-responses
models:
  default: "grok-4.20-reasoning"
  catalog:
    - slug: "grok-4.20-reasoning"
      context_window: 131072
      apply_patch_tool_type: freeform
state:
  backend: memory
  failed_debug_artifact_ttl_seconds: 0
logging:
  level: info
