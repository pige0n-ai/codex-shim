# Codex config sample for routing a custom provider through codex-shim.
#
# This follows the official Codex config layout documented at:
#   https://developers.openai.com/codex/config-sample
#   https://developers.openai.com/codex/config-reference
#
# Place this in $CODEX_HOME/config.toml, or merge the relevant parts into
# your existing Codex config.
#
# Default Codex config path:
#   macOS / Linux: ~/.codex/config.toml
#   Windows: %USERPROFILE%\.codex\config.toml
#
# Pick a provider ID that is NOT one of Codex's built-ins.
# The official docs reserve: openai, ollama, lmstudio, amazon-bedrock.

model_provider = "codex_shim"

# This must match a model slug exposed by codex-shim's /models endpoint.
# In practice, keep it equal to the `models.default` value in your chosen
# examples/<profile>/config.yaml file.
model = "deepseek-v4-pro"

# Start with hosted web search disabled. Most codex-shim profiles adapt an
# upstream /chat/completions API, and hosted tools are not available there.
# Only switch this to "cached" or "live" when your chosen shim profile targets
# a real Responses-capable upstream and your shim model catalog advertises
# supports_search_tool = true.
web_search = "disabled"

# Optional Codex defaults, if your chosen upstream/profile supports them:
# model_reasoning_effort = "high"
# model_verbosity = "medium"

# Current Codex still loads custom model metadata from a startup catalog file.
# Without this, custom models may fall back to generic metadata and fail to
# appear in `/model`. `codex-shim install-codex-config` writes this for you.
# model_catalog_json = "/absolute/path/to/$CODEX_HOME/codex-shim/model-catalog.json"

[model_providers.codex_shim]
name = "codex-shim"
base_url = "http://127.0.0.1:8787/v1"

# Optional:
# Add env_key only when the shim itself is protected by bearer auth, or when
# you are routing Codex through a remote/shared shim gateway.
# env_key = "LOCAL_SHIM_TOKEN"
# env_key_instructions = "Set LOCAL_SHIM_TOKEN before starting Codex."

# codex-shim always presents the Responses API to Codex, even when the upstream
# provider only speaks /chat/completions internally.
wire_api = "responses"

# Required: codex-shim serves HTTP + SSE only.
supports_websockets = false

# Optional provider-level transport tuning from the official Codex config schema:
# request_max_retries = 4
# stream_max_retries = 5
# stream_idle_timeout_ms = 300000
#
# Optional static or env-backed headers/query params if you need an extra local
# reverse proxy layer in front of codex-shim:
# http_headers = { "X-Example" = "value" }
# env_http_headers = { "X-Trace-Id" = "CODEX_SHIM_TRACE_ID" }
# query_params = { tenant = "dev" }

# Alternative auth mode:
# Use this instead of env_key when you want Codex itself to run a command that
# fetches the LOCAL_SHIM_TOKEN. Do not set both env_key and auth at the same time.
#
# [model_providers.codex_shim.auth]
# command = "/usr/local/bin/fetch-local-shim-token"
# args = []
# cwd = null
# timeout_ms = 5000
# refresh_interval_ms = 300000
