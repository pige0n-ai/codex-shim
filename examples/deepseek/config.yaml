# ── Legacy DeepSeek example path ────────────────────────────────────
# Prefer examples/deepseek-chat/config.yaml for the recommended profile name.
# This file stays here for users who already reference examples/deepseek/.

server:
  listen: "127.0.0.1:8787"

upstream:
  base_url: "https://api.deepseek.com"
  chat_path: "/chat/completions"
  api_key_env: "DEEPSEEK_API_KEY"

provider:
  kind: deepseek-chat
  profile_config:
    profile: deepseek-chat

reasoning:
  enabled: true
  effort: high

models:
  default: "deepseek-v4-pro"
  catalog:
    - slug: "deepseek-v4-pro"
      context_window: 131072

state:
  backend: memory

logging:
  level: info
