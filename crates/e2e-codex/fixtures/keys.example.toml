# ── E2E Live Provider Secrets ─────────────────────────────────────
# Copy this file to secrets/e2e.providers.toml and fill in your API keys.
# NEVER commit secrets/e2e.providers.toml to the repository.
#
# Run: CODEX_SHIM_E2E_KEYS=secrets/e2e.providers.toml \
#      cargo test -p e2e-codex --test codex_live -- --ignored --nocapture
#
# Differential suite also requires:
#   export CODEX_SHIM_E2E_OPENAI_MODEL="gpt-5.4-mini"
#
# Preferred:
#   export OPENAI_API_KEY="sk-..."
#
# Fallback:
#   export CODEX_SHIM_E2E_OPENAI_AUTH_JSON="${CODEX_HOME:-$HOME/.codex}/auth.json"
#   # See https://developers.openai.com/codex/auth for copying auth.json into
#   # headless or isolated environments. API keys remain the recommended default
#   # for automation.

[deepseek-chat]
enabled = false
profile = "deepseek-chat"
model = "deepseek-v4-pro"
base_url = "https://api.deepseek.com"
chat_path = "/chat/completions"
api_key_env = "DEEPSEEK_API_KEY"
api_key = "sk-..."

[groq-chat]
enabled = false
profile = "groq-chat"
model = "llama-3.3-70b-versatile"
base_url = "https://api.groq.com/openai/v1"
chat_path = "/chat/completions"
api_key_env = "GROQ_API_KEY"
api_key = "gsk_..."

[openrouter-chat]
enabled = false
profile = "openrouter-chat"
model = "openai/gpt-4o-mini"
base_url = "https://openrouter.ai/api/v1"
chat_path = "/chat/completions"
api_key_env = "OPENROUTER_API_KEY"
api_key = "sk-or-..."
http_headers = { "HTTP-Referer" = "http://localhost/codex-shim-e2e", "X-OpenRouter-Title" = "codex-shim e2e" }

[openrouter-responses]
enabled = false
profile = "openrouter-responses"
model = "openai/gpt-4o-mini"
base_url = "https://openrouter.ai/api/v1"
responses_path = "/responses"
api_key_env = "OPENROUTER_API_KEY"
api_key = "sk-or-..."

[fireworks-chat]
enabled = false
profile = "fireworks-chat"
model = "accounts/fireworks/models/llama-v3p1-8b-instruct"
base_url = "https://api.fireworks.ai/inference/v1"
chat_path = "/chat/completions"
api_key_env = "FIREWORKS_API_KEY"
api_key = "fw_..."

[together-chat]
enabled = false
profile = "together-chat"
model = "meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo"
base_url = "https://api.together.xyz/v1"
chat_path = "/chat/completions"
api_key_env = "TOGETHER_API_KEY"
api_key = "..."

[ollama-chat]
enabled = false
profile = "ollama-chat"
model = "llama3.2"
base_url = "http://localhost:11434/v1"
chat_path = "/chat/completions"
api_key_env = "OLLAMA_API_KEY"
api_key = "ollama"

[ollama-responses]
enabled = false
profile = "ollama-responses"
model = "llama3.2"
base_url = "http://localhost:11434/v1"
responses_path = "/responses"
api_key_env = "OLLAMA_API_KEY"
api_key = "ollama"

[vllm-chat]
enabled = false
profile = "vllm-chat"
model = "meta-llama/Meta-Llama-3.1-8B-Instruct"
base_url = "http://localhost:8000/v1"
chat_path = "/chat/completions"
api_key_env = "VLLM_API_KEY"
api_key = "not-needed"
