name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install GUI deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Format GUI
        run: cargo fmt --manifest-path gui/src-tauri/Cargo.toml --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Core tests
        run: cargo test

      - name: GUI tests
        run: cargo test --manifest-path gui/src-tauri/Cargo.toml

      - name: Build shim once for mock E2E
        run: cargo build -p codex-shim

      - name: Build release binary
        run: cargo build --release -p codex-shim

      - name: Build GUI release binary
        run: cargo build --release --manifest-path gui/src-tauri/Cargo.toml

      - name: Package smoke
        run: |
          python scripts/package_release.py \
            --binary target/release/codex-shim \
            --name codex-shim \
            --target x86_64-unknown-linux-gnu \
            --version ci \
            --output-dir target/dist-smoke
          python scripts/package_release.py \
            --binary gui/src-tauri/target/release/codex-shim-gui \
            --name codex-shim-gui \
            --target x86_64-unknown-linux-gnu \
            --version ci \
            --output-dir target/dist-smoke

      - name: Mock E2E
        env:
          CODEX_SHIM_BIN: ${{ github.workspace }}/target/debug/codex-shim
        run: cargo test -p e2e-codex --test codex_mock -- --nocapture

  platform-test:
    name: Platform Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - macos-15
          - windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install GUI deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - uses: Swatinem/rust-cache@v2

      - name: Test workspace defaults
        run: cargo test

      - name: Build release binary
        run: cargo build --release -p codex-shim

      - name: Build GUI release binary
        run: cargo build --release --manifest-path gui/src-tauri/Cargo.toml
