name: Release

on:
  push:
    tags:
      - "v*"
      - "gui-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.0 or gui-v0.1.0)'
        required: true
      source_commit_url:
        description: 'Upstream openai/codex commit URL for synced base instructions'
        required: false

env:
  CARGO_TERM_COLOR: always

jobs:
  detect:
    name: Detect release type
    runs-on: ubuntu-latest
    outputs:
      build-gui: ${{ steps.detect.outputs.build-gui }}
      release-name: ${{ steps.detect.outputs.release-name }}
      release-tag: ${{ steps.detect.outputs.release-tag }}
      binary-prefix: ${{ steps.detect.outputs.binary-prefix }}
    steps:
      - id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ "$TAG" == gui-v* ]]; then
            echo "build-gui=true" >> "$GITHUB_OUTPUT"
            echo "release-name=codex-shim-gui ${TAG#gui-}" >> "$GITHUB_OUTPUT"
            echo "release-tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "binary-prefix=codex-shim-gui" >> "$GITHUB_OUTPUT"
          else
            echo "build-gui=false" >> "$GITHUB_OUTPUT"
            echo "release-name=codex-shim ${TAG}" >> "$GITHUB_OUTPUT"
            echo "release-tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "binary-prefix=codex-shim" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: detect
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cli_bin: codex-shim
            gui_bin: ""
            is_musl: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            cli_bin: codex-shim
            gui_bin: codex-shim-gui
          - os: macos-15
            target: aarch64-apple-darwin
            cli_bin: codex-shim
            gui_bin: codex-shim-gui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cli_bin: codex-shim.exe
            gui_bin: codex-shim-gui.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install musl tools (Linux CLI)
        if: matrix.is_musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools


      - uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Build CLI
        if: matrix.cli_bin != '' && needs.detect.outputs.build-gui == 'false'
        run: cargo build --release -p codex-shim --target ${{ matrix.target }}

      - name: Build GUI
        if: matrix.gui_bin != '' && needs.detect.outputs.build-gui == 'true'
        run: cargo build --release --manifest-path gui/src-tauri/Cargo.toml --target ${{ matrix.target }}

      - name: Package CLI
        if: matrix.cli_bin != '' && needs.detect.outputs.build-gui == 'false'
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          [[ "${{ matrix.cli_bin }}" == *.exe ]] && EXT=".exe"
          cp "target/${{ matrix.target }}/release/${{ matrix.cli_bin }}" "dist/codex-shim-${{ needs.detect.outputs.release-tag }}-${{ matrix.target }}${EXT}"

      - name: Package refs.zip (Linux CLI only)
        if: matrix.is_musl && needs.detect.outputs.build-gui == 'false'
        shell: bash
        run: |
          python -c 'import os,zipfile; tag=os.environ["RELEASE_TAG"]; zf=zipfile.ZipFile(f"dist/codex-shim-{tag}-refs.zip","w",zipfile.ZIP_DEFLATED); [zf.write(f,f) for f in ["README.md","LICENSE"]]; [[zf.write(os.path.join(r,f),os.path.join(r,f)) for f in fs] for r,_,fs in os.walk("examples")]; zf.close()'
        env:
          RELEASE_TAG: ${{ needs.detect.outputs.release-tag }}



      - name: Package GUI
        if: matrix.gui_bin != '' && needs.detect.outputs.build-gui == 'true'
        shell: bash
        run: |
          mkdir -p dist
          EXT=""
          [[ "${{ matrix.gui_bin }}" == *.exe ]] && EXT=".exe"
          cp "gui/src-tauri/target/${{ matrix.target }}/release/${{ matrix.gui_bin }}" "dist/codex-shim-gui-${{ needs.detect.outputs.release-tag }}-${{ matrix.target }}${EXT}"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*
          if-no-files-found: ignore

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: [detect, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate release notes
        env:
          SOURCE_COMMIT_URL: ${{ github.event.inputs.source_commit_url }}
        run: |
          {
            if [[ -n "$SOURCE_COMMIT_URL" ]]; then
              echo "Synced Codex base instructions from openai/codex commit: $SOURCE_COMMIT_URL"
              echo
            fi
            echo "| Platform | Target |"
            echo "|----------|--------|"
            echo "| Linux (static musl) | x86_64-unknown-linux-musl |"
            echo "| macOS Intel | x86_64-apple-darwin |"
            echo "| macOS Apple Silicon | aarch64-apple-darwin |"
            echo "| Windows | x86_64-pc-windows-msvc |"
          } > notes.md

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.detect.outputs.release-name }}
          tag_name: ${{ needs.detect.outputs.release-tag }}
          body_path: notes.md
          files: dist/*
