name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: codex-shim
            gui_binary: codex-shim-gui
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: codex-shim
            gui_binary: codex-shim-gui
          - os: macos-15
            target: aarch64-apple-darwin
            binary: codex-shim
            gui_binary: codex-shim-gui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: codex-shim.exe
            gui_binary: codex-shim-gui.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install GUI deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - uses: Swatinem/rust-cache@v2

      - name: Build CLI release binary
        run: cargo build --release -p codex-shim --target ${{ matrix.target }}

      - name: Build GUI release binary
        run: cargo build --release --manifest-path gui/src-tauri/Cargo.toml --target ${{ matrix.target }}

      - name: Package archives
        shell: bash
        run: |
          python scripts/package_release.py \
            --binary "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
            --name "codex-shim" \
            --target "${{ matrix.target }}" \
            --version "${GITHUB_REF_NAME:-dev}" \
            --output-dir dist
          python scripts/package_release.py \
            --binary "gui/src-tauri/target/${{ matrix.target }}/release/${{ matrix.gui_binary }}" \
            --name "codex-shim-gui" \
            --target "${{ matrix.target }}" \
            --version "${GITHUB_REF_NAME:-dev}" \
            --output-dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
